<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>portfolio</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap');

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
}

/* background */
.bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;

    background-image: url('background_inv.jpg');
    background-size: cover;
}

/* layout */
.container {
    position: relative;
    z-index: 2;
    max-width: 800px;
    margin: 100px auto;
    padding: 20px;
}

/* hero */
h1 {
    font-family: 'Finger Paint';
    font-size: 3rem;
    margin: 0;
}

.tagline {
    opacity: 0.7;
    margin-top: 10px;
}

/* separator */
.separator {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
    margin: 30px 0;
}

/* projects */
.project {
    margin-bottom: 20px;
}

.project a {
    color: #fff;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.3);
}

.project a:hover {
    border-bottom: 1px solid #fff;
}

/* mention */
.mention {
    background: rgba(88, 101, 242, 0.2);
    color: #5865f2;
    padding: 2px 6px;
    border-radius: 6px;
}
</style>
</head>

<body>
<div class="bg"></div>

<div class="container">

    <h1>lex</h1>
    <p class="tagline">programmer • roblox dev • discord bots • things that break and get fixed later</p>

    <div class="separator"></div>

    <h2>projects</h2>

    <div class="project">
        <a href="#">wwoyhs bot</a> — discord moderation + tools bot
    </div>

    <div class="project">
        <a href="#">xel bot</a> — discord moderation + tools bot
    </div>

    <div class="project">
        <a href="#">minecraft bob mod</a> — experimental npc mod
    </div>

    <div class="separator"></div>

    <h2>links</h2>

    <p>
        github: <span class="mention">@lexthatdev</span><br>
        discord: <span class="mention">@lex</span>
    </p>

</div>
</body>
</html>
